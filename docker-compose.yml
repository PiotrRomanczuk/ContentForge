services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=contentforge;Username=postgres;Password=postgres
      # REQUIRED: Set these in .env or shell — no fallback defaults for security
      - Auth__ApiKey=${CONTENTFORGE_API_KEY:?Set CONTENTFORGE_API_KEY in .env}
      - Auth__JwtSecret=${CONTENTFORGE_JWT_SECRET:?Set CONTENTFORGE_JWT_SECRET in .env}
      - Auth__Issuer=ContentForge
      - Auth__Audience=ContentForge-API
      - Auth__TokenExpirationHours=24
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=contentforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
